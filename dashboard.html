<!DOCTYPE html>
<html>
<head>
    <title>Financial Dashboard</title>
    <style>
        :root {
            --bg: #f4f8ff;
            --panel: #ffffff;
            --ink: #1b2430;
            --muted: #5f6b7a;
            --good: #1a7f37;
            --warn: #b7791f;
            --bad: #b42318;
            --accent: #006adc;
            --line: #dce5f2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef5ff, #f9fbff);
            color: var(--ink);
        }
        .wrap {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .hero {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .input {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 10px;
            min-width: 200px;
        }
        button {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 600;
        }
        button.primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
        }
        .kpis {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        .kpi {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: #fbfdff;
        }
        .kpi .v {
            font-size: 20px;
            font-weight: 700;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .table th, .table td {
            border-bottom: 1px solid var(--line);
            text-align: left;
            padding: 8px 6px;
            vertical-align: top;
        }
        .pill {
            display: inline-block;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 8px;
        }
        .ok { background: #e9f8ef; color: var(--good); }
        .review { background: #fff4e5; color: var(--warn); }
        .rej { background: #ffeceb; color: var(--bad); }
        .note { color: var(--muted); font-size: 13px; margin-top: 8px; }
        #toast { min-height: 20px; margin-top: 8px; font-size: 14px; color: var(--muted); }
        @media (max-width: 800px) {
            .kpis { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="hero">
        <h1>Financial Close Dashboard</h1>
        <div class="controls">
            <button class="primary" onclick="runClose()">Run Reconciliation</button>
            <button onclick="initiateClose()">Initiate Close</button>
            <button onclick="viewCloseStatus()">View Close Status</button>
            <button onclick="viewClosePackage()">View Close Package</button>
            <button onclick="generateReport()">Generate Audit Report</button>
            <button onclick="loadData()">Refresh</button>
            <input id="approverName" class="input" placeholder="Approver name (e.g., Priya)" />
            <input id="closePeriod" class="input" placeholder="Close period (YYYY-MM)" />
        </div>
        <div id="toast"></div>
        <div class="kpis">
            <div class="kpi"><div class="v" id="kpiMatched">0</div><div>Matched</div></div>
            <div class="kpi"><div class="v" id="kpiUnBank">0</div><div>Unmatched Bank</div></div>
            <div class="kpi"><div class="v" id="kpiUnGl">0</div><div>Unmatched GL</div></div>
            <div class="kpi"><div class="v" id="kpiReady">0</div><div>Ready For Approval</div></div>
            <div class="kpi"><div class="v" id="kpiPending">0</div><div>Pending Review</div></div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Matches</h2>
            <div id="matches"></div>
        </div>

        <div class="card">
            <h2>Journal Entries</h2>
            <div id="journal"></div>
        </div>
    </div>
</div>

<script>
const api = "";

function statusClass(status) {
    if (status === "READY_FOR_APPROVAL" || status === "APPROVED") return "ok";
    if (status === "REJECTED") return "rej";
    return "review";
}

function riskClass(priority) {
    if (priority === "CRITICAL" || priority === "HIGH") return "rej";
    if (priority === "MEDIUM") return "review";
    return "ok";
}

function getApprover() {
    const raw = document.getElementById("approverName").value.trim();
    return raw || "unknown_user";
}

function getClosePeriod() {
    const raw = document.getElementById("closePeriod").value.trim();
    return raw || null;
}

function setToast(msg) {
    document.getElementById("toast").textContent = msg;
}

async function loadData() {
    try {
        const [matches, journal, governance] = await Promise.all([
            fetch(`${api}/matches`).then(r => r.json()),
            fetch(`${api}/journal`).then(r => r.json()),
            fetch(`${api}/governance/dashboard`).then(r => r.json())
        ]);

        const matchedCount = matches.filter(m => m.status === "matched").length;
        const unBank = matches.filter(m => m.status === "unmatched_bank").length;
        const unGl = matches.filter(m => m.status === "unmatched_gl").length;
        const ready = journal.filter(j => j.status === "READY_FOR_APPROVAL").length;
        document.getElementById("kpiMatched").textContent = matchedCount;
        document.getElementById("kpiUnBank").textContent = unBank;
        document.getElementById("kpiUnGl").textContent = unGl;
        document.getElementById("kpiReady").textContent = ready;
        document.getElementById("kpiPending").textContent = governance.pending_reviews || 0;

        document.getElementById("matches").innerHTML = matches.length ? `
            <table class="table">
                <thead>
                    <tr><th>Status</th><th>Bank ID</th><th>GL ID</th><th>Confidence</th></tr>
                </thead>
                <tbody>
                    ${matches.map(m => `
                        <tr>
                            <td><span class="pill ${m.status === 'matched' ? 'ok' : 'review'}">${m.status}</span></td>
                            <td>${m.bank_id || "-"}</td>
                            <td>${m.gl_id || "-"}</td>
                            <td>${m.confidence ? Number(m.confidence).toFixed(1) + "%" : "-"}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        ` : `<div class="note">No records yet. Run reconciliation first.</div>`;

        document.getElementById("journal").innerHTML = journal.length ? `
            <table class="table">
                <thead>
                    <tr><th>Entry</th><th>Amount</th><th>Status</th><th>Risk</th><th>Reason</th><th>Controls</th><th>Owner</th><th>Action</th></tr>
                </thead>
                <tbody>
                    ${journal.map(j => `
                        <tr>
                            <td>${j.entry_id}</td>
                            <td>${j.amount}</td>
                            <td><span class="pill ${statusClass(j.status)}">${j.status}</span></td>
                            <td>
                                <span class="pill ${riskClass((j.risk && j.risk.priority) || 'NONE')}">
                                    ${(j.risk && j.risk.priority) || "NONE"} (${(j.risk && j.risk.score) || 0})
                                </span>
                            </td>
                            <td>${j.explanation || "-"}</td>
                            <td>
                                ${(j.control_summary && typeof j.control_summary.failed === "number")
                                    ? `${j.control_summary.failed} fail / ${j.control_summary.total} total`
                                    : "-"}
                            </td>
                            <td>${j.approved_by || j.rejected_by || "-"}</td>
                            <td>
                                <button onclick="approve('${j.entry_id}')">Approve</button>
                                <button onclick="reject('${j.entry_id}')">Reject</button>
                            </td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        ` : `<div class="note">No journal entries yet.</div>`;
        setToast("Dashboard refreshed.");
    } catch (err) {
        setToast(`Error loading data: ${err.message}`);
    }
}

loadData();
</script>

<script>
async function approve(id) {
    const approver = encodeURIComponent(getApprover());
    const res = await fetch(`${api}/approve/${id}?approver=${approver}`, {method: "POST"});
    const data = await res.json();
    if (!res.ok) {
        setToast(`Approval failed: ${data.detail || "Unknown error"}`);
        return;
    }
    setToast(`Approved ${id} by ${decodeURIComponent(approver)}`);
    loadData();
}

async function reject(id) {
    const approver = encodeURIComponent(getApprover());
    const res = await fetch(`${api}/reject/${id}?approver=${approver}`, {method: "POST"});
    const data = await res.json();
    if (!res.ok) {
        setToast(`Rejection failed: ${data.detail || "Unknown error"}`);
        return;
    }
    setToast(`Rejected ${id} by ${decodeURIComponent(approver)}`);
    loadData();
}

async function runClose() {
    const period = getClosePeriod();
    setToast("Running reconciliation...");
    const query = period ? `?period=${encodeURIComponent(period)}` : "";
    const res = await fetch(`${api}/run-close${query}`, {method: "POST"});
    const data = await res.json();
    if (!res.ok) {
        setToast(`Run failed: ${data.detail || "unknown error"}`);
        return;
    }
    setToast(`Run complete. Matched: ${data.summary.matched}, Journal: ${data.summary.journal_entries}`);
    loadData();
}

async function generateReport() {
    setToast("Generating report...");
    const res = await fetch(`${api}/generate-report`);
    const data = await res.json();
    setToast(data.message || "Audit report generated.");
}

async function initiateClose() {
    const period = getClosePeriod();
    if (!period) {
        setToast("Please enter close period in YYYY-MM format.");
        return;
    }
    const res = await fetch(`${api}/close/initiate?period=${encodeURIComponent(period)}`, {method: "POST"});
    const data = await res.json();
    if (!res.ok) {
        setToast(`Initiation failed: ${data.detail || "unknown error"}`);
        return;
    }
    setToast(`Close initiated for ${data.period}`);
}

async function viewCloseStatus() {
    const period = getClosePeriod();
    if (!period) {
        setToast("Please enter close period in YYYY-MM format.");
        return;
    }
    const res = await fetch(`${api}/close/status?period=${encodeURIComponent(period)}`);
    const data = await res.json();
    if (!res.ok) {
        setToast(`Status failed: ${data.detail || "unknown error"}`);
        return;
    }
    const pending = (data.checklist || []).filter(t => t.status !== "COMPLETED").length;
    setToast(`Close ${data.period}: ${data.status} | Open tasks: ${pending}`);
}

async function viewClosePackage() {
    const period = getClosePeriod();
    if (!period) {
        setToast("Please enter close period in YYYY-MM format.");
        return;
    }
    const res = await fetch(`${api}/close/package?period=${encodeURIComponent(period)}`);
    const data = await res.json();
    if (!res.ok) {
        setToast(`Package failed: ${data.detail || "unknown error"}`);
        return;
    }
    setToast(`Package ${data.period}: Status=${data.overall_status}, Pending=${data.summary.pending_reviews}`);
}
</script>

</body>
</html>
